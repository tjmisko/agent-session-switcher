# Agent Session Switcher — Hyprland keybindings
# Source this from your hyprland.conf:
#   source = ~/Projects/agent-session-switcher/integration/hyprland.conf

# Session toggle (spawn / detach / hide / show)
bind = $mainMod, A, exec, /home/tjmisko/Projects/agent-session-switcher/bin/agent-session-toggle

# Session picker (rofi — faster, no preview)
bind = $mainMod SHIFT, A, exec, /home/tjmisko/Projects/agent-session-switcher/bin/agent-session-picker-rofi

# Open editor alongside active session
bind = $mainMod, E, exec, /home/tjmisko/Projects/agent-session-switcher/bin/agent-open-editor

# Focus agent terminal
bind = $mainMod, F4, exec, /home/tjmisko/Projects/agent-session-switcher/bin/agent-session-jump

# Cycle sessions (up/down) — switches tmux session in-place
bind = $mainMod, Up, exec, /home/tjmisko/Projects/agent-session-switcher/bin/agent-session-cycle up
bind = $mainMod, Down, exec, /home/tjmisko/Projects/agent-session-switcher/bin/agent-session-cycle down

# Priority queue view
bind = $mainMod SHIFT, Q, exec, ~/.config/scripts/hypr-float-center 70 --class agentQueue /home/tjmisko/Projects/agent-session-switcher/bin/agent-session-queue

# Window rules
windowrulev2 = float, class:^(agentTerminal)$
windowrulev2 = float, class:^(agentQueue)$
