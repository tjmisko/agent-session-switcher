# Agent Session Switcher — tmux keybindings
# Source this from your tmux.conf:
#   source-file ~/Projects/agent-session-switcher/integration/tmux.conf
#
# Note: agent-session-create sets per-session options:
#   automatic-rename on, automatic-rename-format (calls agent-tmux-title),
#   and status-interval 1 for live-updating window titles.

# Alt+Up/Down: cycle through agent sessions within the current client
bind -n M-Up   run-shell "~/Projects/agent-session-switcher/bin/agent-session-cycle-client prev"
bind -n M-Down run-shell "~/Projects/agent-session-switcher/bin/agent-session-cycle-client next"
