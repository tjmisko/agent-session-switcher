# Agent Session Switcher — i3 keybindings (future)
# Include this from your i3 config:
#   include ~/Projects/agent-session-switcher/integration/i3.conf

# Session picker
bindsym $mod+a exec --no-startup-id agent-session-picker

# Open editor alongside active session
bindsym $mod+e exec --no-startup-id agent-open-editor

# Jump to active session workspace
bindsym $mod+F4 exec --no-startup-id agent-session-jump

# Cycle sessions
bindsym $mod+Up exec --no-startup-id agent-session-cycle up
bindsym $mod+Down exec --no-startup-id agent-session-cycle down

# Priority queue
bindsym $mod+Shift+q exec --no-startup-id agent-session-queue
